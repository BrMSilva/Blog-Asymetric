server {
    listen 80;
    server_name blog-bmarques.duckdns.org;
    # Redireciona automaticamente para HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name blog-bmarques.duckdns.org;

    # Caminhos dos certificados (mapeados via volume no Docker)
    ssl_certificate /etc/letsencrypt/live/blog-bmarques.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/blog-bmarques.duckdns.org/privkey.pem;

    # Otimizações de Segurança SSL
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    location /posts {
        proxy_pass http://backend:4000/posts;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}