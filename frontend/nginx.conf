server {
    listen 80;
    server_name blog-bmarques.duckdns.org;

    # Necessário para o Certbot validar seu domínio
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    location /posts {
        proxy_pass http://blog-backend:4000/posts;
        proxy_set_header Host $host;
    }
}