services:
  backend:
    build: ./backend
    container_name: blog-backend
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
      - ADMIN_TOKEN=32015ad428cc76b71cfe1ceefdc71f496fe6c10319e8c20411c64bcefa2bfca7
      - DB_PATH=/data/blog.sqlite
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    volumes:
      - backend_data:/data
    restart: unless-stopped

  frontend:
    build: ./frontend 
    container_name: blog-frontend
    ports:
      - "80:80"
      - "443:443" # Essencial para o HTTPS
    environment:
      # Agora a API passa pelo domínio seguro
      - VITE_API_URL=https://blog-bmarques.duckdns.org/posts
    volumes:
      # Mapeamento para o Nginx ler os certificados gerados
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      - backend
    restart: unless-stopped

  certbot:
    image: certbot/certbot
    container_name: certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    # Comando para verificar renovação a cada 12 horas
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

volumes:
  backend_data:



